# =============================================================================
# Neo4j Configuration - Single Instance (Standalone)
# Optimized for: AWS r6.32xlarge (128 vCPU, 1024 GiB RAM)
# Disk Layout:
#   - /NEO4J      (100GB)  : Application (NEO4J_HOME, logs, plugins, conf)
#   - /NEO4J_DATA (3TB)    : Data directory (databases, transactions)
#   - /NEO4J_APPS (10GB)   : Automation / import files (LOAD CSV, scripts)
# User/Group: neo4jcam:neo4jcam (all mounts must be owned by this user)
# Neo4j Version: 5.x (settings use server.* prefix)
# =============================================================================

# -----------------------------------------------------------------------------
# MEMORY CONFIGURATION (Critical for performance on 1 TiB RAM server)
# Strategy: Balanced heap for query execution + very large page cache for
# graph data/index caching (minimizes disk I/O). OS reserve generous for
# 128-core instance with high network/EBS activity.
# Recommendation: Run `bin/neo4j-admin server memory-recommendation --memory=1024g`
# after initial data load to fine-tune based on actual store sizes.
# -----------------------------------------------------------------------------

# JVM Heap: Set initial == max to avoid resizing/GC pauses.
# 32g chosen as balanced: sufficient for high-concurrency queries, procedures,
# result sets on 128 vCPU without excessive GC pressure. Increase to 48-64g
# if heavy GDS/analytics or very large query memory usage observed.
server.memory.heap.initial_size=32g
server.memory.heap.max_size=32g

# Page Cache (off-heap): Primary performance lever for graph workloads.
# Caches nodes, relationships, properties, indexes. Set very high to keep
# hot working set in RAM. 850g leaves ~140g for OS, native buffers,
# network, vector indexes (if used), and headroom. 
# If your active dataset + indexes > ~700GB, consider increasing to 900g+
# and reducing heap to 16-24g (test with your workload).
server.memory.pagecache.size=850g

# Optional: Global transaction memory cap (on-heap by default, recommended).
# Uncomment/adjust if you see OOM from runaway queries; otherwise leave
# Neo4j to manage (or set high like 128g).
# dbms.memory.transaction.total.max=128g

# -----------------------------------------------------------------------------
# DIRECTORY CONFIGURATION (Custom mounts for performance & separation)
# Ensure directories exist and are owned by neo4jcam:neo4jcam before starting.
# Neo4j will create subdirectories (databases/, transactions/, etc.) as needed.
# -----------------------------------------------------------------------------

server.directories.data=/NEO4J_DATA
server.directories.logs=/NEO4J/logs
server.directories.import=/NEO4J_APPS
server.directories.plugins=/NEO4J/plugins
server.directories.transaction.logs.root=/NEO4J_DATA/transactions

# Optional: Dumps location (backups/restore) under data volume
# server.directories.dumps.root=/NEO4J_DATA/dumps

# -----------------------------------------------------------------------------
# CONNECTORS / NETWORK (Single server - expose for remote access)
# IMPORTANT: Restrict access via AWS Security Groups, NACLs, or VPN.
# Bolt is primary for applications; HTTP for Browser / monitoring.
# -----------------------------------------------------------------------------

server.bolt.enabled=true
server.bolt.listen_address=0.0.0.0:7687
# server.bolt.advertised_address=your.internal.dns.or.ip:7687   # if behind LB/NAT

server.http.enabled=true
server.http.listen_address=0.0.0.0:7474
server.https.enabled=false
# server.https.listen_address=0.0.0.0:7473

# -----------------------------------------------------------------------------
# PRODUCTION / OPERATIONAL SETTINGS
# -----------------------------------------------------------------------------

# Disable usage reporting (privacy / air-gapped environments)
dbms.usage_report.enabled=false

# Allow custom directory paths without strict validation errors (safe here)
server.config.strict_validation.enabled=false

# Query logging (essential for troubleshooting slow queries on large instance)
dbms.logs.query.enabled=true
dbms.logs.query.threshold=10s
dbms.logs.query.parameter_logging_enabled=false   # set true only if needed for debug (security)

# HTTP logging
dbms.logs.http.enabled=true

# Transaction log retention (generous because of 3TB data volume; adjust to your
# backup/restore strategy. Keeps point-in-time recovery window.)
dbms.tx.logs.rotation.retention_policy=30 days

# Checkpointing (tune if very high write throughput; defaults are usually fine)
# dbms.checkpoint.interval.time=15m
# dbms.checkpoint.interval.tx=100000

# -----------------------------------------------------------------------------
# SECURITY (Minimal baseline - harden further for production)
# -----------------------------------------------------------------------------
dbms.security.auth_enabled=true
# dbms.security.procedures.unrestricted=apoc.*,gds.*   # if using APOC / GDS plugins
# dbms.security.procedures.allowlist=apoc.*,gds.*     # restrict as needed
